<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrajVG Viewer</title>
  <style>
    :root {
      --primary: #5E2B97;
      --primary-light: #F2EAFB;
      --secondary: #8E44AD;
      --accent: #ea4335;
      --bg: #ffffff;
      --surface: #f5f5f5;
      --text: #222222;
      --text-secondary: #666666;
      --border: #EAEAEA;
      --shadow: rgba(0, 0, 0, 0.05);
      --shadow-hover: rgba(0, 0, 0, 0.1);
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 32px;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #canvas-container {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #status-bar {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 16px;
      border-radius: 8px;
      pointer-events: auto;
      box-shadow: 0 4px 6px var(--shadow);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      color: var(--text);
      transition: opacity 0.5s ease, transform 0.5s ease;
      font-weight: 500;
    }

    #status-bar.hidden {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
    }

    #control-panel {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 16px;
      border-radius: 12px;
      display: flex;
      gap: 16px;
      align-items: center;
      pointer-events: auto;
      box-shadow: 0 4px 10px var(--shadow);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
    }

    #timeline {
      width: 400px;
      height: 8px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 4px;
      position: relative;
      cursor: pointer;
    }

    #progress {
      position: absolute;
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      width: 0%;
    }

    #playback-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    button:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }

    button.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(94, 43, 151, 0.4);
    }

    select, input {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      white-space: nowrap;
      margin-bottom: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      box-shadow: 0 2px 4px var(--shadow);
      border: 1px solid var(--border);
    }

    button:hover .tooltip {
      opacity: 1;
    }

    #settings-panel {
      position: absolute;
      bottom: 80px;
      right: 16px;
      background: rgba(255, 255, 255, 0.98);
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      max-height: calc(100vh - 150px);
      overflow-y: auto;
      pointer-events: auto;
      box-shadow: 0 4px 15px var(--shadow);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      transform: translateY(0);
      transition: transform 0.3s ease, opacity 0.3s ease;
      display: none;
      opacity: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--primary-light) transparent;
    }

    #settings-panel::-webkit-scrollbar {
      width: 6px;
    }

    #settings-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #settings-panel::-webkit-scrollbar-thumb {
      background-color: var(--primary-light);
      border-radius: 6px;
    }

    @media (max-height: 700px) {
      #settings-panel {
        max-height: 500px;
        bottom: 100px;
      }
    }

    @media (max-width: 768px) {
      #control-panel {
        width: 90%;
        flex-wrap: wrap;
        justify-content: center;
      }

      #timeline {
        width: 100%;
        order: 3;
        margin-top: 10px;
      }

      #settings-panel {
        width: 280px;
        right: 10px;
      }
    }

    .settings-group {
      margin-bottom: 16px;
    }

    .settings-group h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-container label {
      min-width: 80px;
      font-size: 14px;
    }

    input[type="range"] {
      flex-grow: 1;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 2px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.1);
      transition: .4s;
      border-radius: 20px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background: var(--primary);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .checkbox-container label {
      font-size: 14px;
      cursor: pointer;
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(94, 43, 151, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-text {
      margin-top: 16px;
      font-size: 18px;
      color: var(--text);
      font-weight: 500;
    }

    #frame-counter {
      display: none;
    }

    .control-btn {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .control-btn:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }

    .control-btn.active {
      background: var(--primary);
      color: white;
    }

    .control-btn.active:hover {
      background: var(--primary);
      box-shadow: 0 2px 8px rgba(94, 43, 151, 0.4);
    }

    #settings-toggle-btn {
      position: relative;
      border-radius: 6px;
      z-index: 20;
    }

    #settings-toggle-btn.active {
      background: var(--primary);
      color: white;
    }

    #status-bar,
    #control-panel,
    #settings-panel,
    button,
    input,
    select,
    .toggle-switch {
      pointer-events: auto;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: var(--space-md);
      color: var(--primary);
      cursor: move;
      user-select: none;
      display: flex;
      align-items: center;
    }

    .drag-handle {
      font-size: 14px;
      margin-right: 8px;
      opacity: 0.6;
    }

    h2:hover .drag-handle {
      opacity: 1;
    }

    .loading-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    #reset-view-btn {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(94, 43, 151, 0.2);
      font-weight: 600;
      transition: all 0.2s;
    }

    #reset-view-btn:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(94, 43, 151, 0.3);
    }

    #settings-panel.visible {
      display: block;
      opacity: 1;
      animation: slideIn 0.3s ease forwards;
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .dragging {
      opacity: 0.9;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15) !important;
      transition: none !important;
    }

    .tooltip-drag {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
      bottom: 100%;
      margin-bottom: 8px;
    }

    h2:hover .tooltip-drag {
      opacity: 1;
    }

    .btn-group {
      display: flex;
      margin-top: 16px;
    }

    #reset-view-btn, #reset-settings-btn {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(94, 43, 151, 0.2);
      font-weight: 600;
      transition: all 0.2s;
    }

    #reset-view-btn:hover, #reset-settings-btn:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(94, 43, 151, 0.3);
    }
  </style>
</head>
<body>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <div id="canvas-container"></div>

  <div id="ui-container">
    <div id="status-bar">Initializing...</div>

    <div id="frame-counter">Frame: 0/0</div>

    <div id="control-panel">
      <button id="play-pause-btn" class="control-btn">
        <svg class="icon" viewBox="0 0 24 24">
          <path id="play-icon" d="M8 5v14l11-7z"/>
          <path id="pause-icon" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;"/>
        </svg>
        <span class="tooltip">Play/Pause</span>
      </button>

      <div id="timeline">
        <div id="progress"></div>
      </div>

      <div id="playback-controls">
        <button id="speed-btn" class="control-btn">1x</button>
        <button id="settings-toggle-btn" class="control-btn">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.04,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
          </svg>
          <span class="tooltip">Settings</span>
        </button>
      </div>
    </div>

    <div id="settings-panel">
      <h2><span class="drag-handle">☰</span> Visualization Settings</h2>

      <div class="settings-group">
        <h3>Point Cloud</h3>
        <div class="slider-container">
          <label for="point-size">Size</label>
          <input type="range" id="point-size" min="0.005" max="0.1" step="0.005" value="0.03">
        </div>
        <div class="slider-container">
          <label for="point-opacity">Opacity</label>
          <input type="range" id="point-opacity" min="0.1" max="1" step="0.05" value="1">
        </div>
        <div class="slider-container">
          <label for="max-depth">Max Distance</label>
          <input type="range" id="max-depth" min="0.1" max="100" step="0.5" value="100">
        </div>
      </div>

      <div class="settings-group">
        <h3>Trajectory</h3>
        <div class="checkbox-container">
          <label class="toggle-switch">
            <input type="checkbox" id="show-trajectory" checked>
            <span class="toggle-slider"></span>
          </label>
          <label for="show-trajectory">Show Trajectory</label>
        </div>
        <div class="slider-container">
          <label for="trajectory-line-width">Line Width</label>
          <input type="range" id="trajectory-line-width" min="1" max="10" step="0.5" value="3">
        </div>
        <div class="slider-container">
          <label for="trajectory-ball-size">Ball Size</label>
          <input type="range" id="trajectory-ball-size" min="0.001" max="0.01" step="0.001" value="0.005">
        </div>
        <div class="slider-container">
          <label for="trajectory-history">History Frames</label>
          <input type="range" id="trajectory-history" min="1" max="100" step="1" value="15">
        </div>
      </div>

      <div class="settings-group">
        <h3>Camera</h3>
        <div class="checkbox-container">
          <label class="toggle-switch">
            <input type="checkbox" id="show-camera-frustum" checked>
            <span class="toggle-slider"></span>
          </label>
          <label for="show-camera-frustum">Show Camera Frustum</label>
        </div>
        <div class="slider-container">
          <label for="frustum-size">Size</label>
          <input type="range" id="frustum-size" min="0.02" max="0.5" step="0.01" value="0.2">
        </div>
      </div>

      <div class="settings-group">
        <div class="btn-group">
          <button id="reset-view-btn" style="flex: 1; margin-right: 5px;">Reset View</button>
          <button id="reset-settings-btn" style="flex: 1; margin-left: 5px;">Reset Settings</button>
        </div>
      </div>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading point cloud data...</div>
    <div class="loading-subtitle">TrajVG Interactive Viewer</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.7/build/dat.gui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/lines/LineSegmentsGeometry.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/lines/LineGeometry.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/lines/LineMaterial.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/lines/LineSegments2.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/lines/Line2.js"></script>
  
  <script>
    class PointCloudVisualizer {
      constructor() {
        this.data = null;
        this.config = {};
        this.currentFrame = 0;
        this.isPlaying = false;
        this.playbackSpeed = 1;
        this.lastFrameTime = 0;
        this.defaultSettings = null;
  
        this.rootGroup = null;
        this.globalAlignQuat = new THREE.Quaternion();
  
        this.ui = {
          statusBar: document.getElementById('status-bar'),
          playPauseBtn: document.getElementById('play-pause-btn'),
          speedBtn: document.getElementById('speed-btn'),
          timeline: document.getElementById('timeline'),
          progress: document.getElementById('progress'),
          settingsPanel: document.getElementById('settings-panel'),
          loadingOverlay: document.getElementById('loading-overlay'),
          loadingText: document.getElementById('loading-text'),
          settingsToggleBtn: document.getElementById('settings-toggle-btn'),
          pointSize: document.getElementById('point-size'),
          pointOpacity: document.getElementById('point-opacity'),
          maxDepth: document.getElementById('max-depth'),
          showTrajectory: document.getElementById('show-trajectory'),
          trajectoryLineWidth: document.getElementById('trajectory-line-width'),
          trajectoryBallSize: document.getElementById('trajectory-ball-size'),
          trajectoryHistory: document.getElementById('trajectory-history'),
          resetViewBtn: document.getElementById('reset-view-btn'),
          showCameraFrustum: document.getElementById('show-camera-frustum'),
          frustumSize: document.getElementById('frustum-size')
        };
  
        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.controls = null;
        this.pointCloud = null;
        this.trajectories = [];
        this.cameraFrustum = null;
  
        this.initThreeJS();
        this.loadDefaultSettings().then(() => {
          this.initEventListeners();
          this.loadData();
        });
      }
  
      async loadDefaultSettings() {
        this.defaultSettings = {
          pointSize: 0.03,
          pointOpacity: 1.0,
          maxDepth: 300.0,
          showTrajectory: true,
          trajectoryLineWidth: 3,
          trajectoryBallSize: 0.005,
          trajectoryHistory: 15,
          showCameraFrustum: true,
          frustumSize: 0.2
        };
        this.applyDefaultSettings();
      }
  
      applyDefaultSettings() {
        const s = this.defaultSettings;
        if (!s) return;
        this.ui.pointSize.value = s.pointSize;
        this.ui.pointOpacity.value = s.pointOpacity;
        this.ui.maxDepth.value = s.maxDepth;
        this.ui.showTrajectory.checked = s.showTrajectory;
        this.ui.trajectoryLineWidth.value = s.trajectoryLineWidth;
        this.ui.trajectoryBallSize.value = s.trajectoryBallSize;
        this.ui.trajectoryHistory.value = s.trajectoryHistory;
        this.ui.showCameraFrustum.checked = s.showCameraFrustum;
        this.ui.frustumSize.value = s.frustumSize;
      }
  
      initThreeJS() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0xf8f9fa);
  
        this.rootGroup = new THREE.Group();
        this.scene.add(this.rootGroup);
  
        this.camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          10000
        );
        this.camera.position.set(0, 0, 3);
  
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(this.renderer.domElement);
  
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.target.set(0, 0, -1);
        this.controls.minDistance = 0.01;
        this.controls.maxDistance = 1000;
        this.controls.update();
  
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        this.scene.add(ambientLight);
  
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        this.scene.add(directionalLight);
      }
  
      initEventListeners() {
        window.addEventListener('resize', () => this.onWindowResize());
        this.ui.playPauseBtn.addEventListener('click', () => this.togglePlayback());
  
        this.ui.timeline.addEventListener('click', (e) => {
          const rect = this.ui.timeline.getBoundingClientRect();
          const pos = (e.clientX - rect.left) / rect.width;
          this.seekTo(pos);
        });
  
        this.ui.speedBtn.addEventListener('click', () => this.cyclePlaybackSpeed());
        this.ui.pointSize.addEventListener('input', () => this.updatePointCloudSettings());
        this.ui.pointOpacity.addEventListener('input', () => this.updatePointCloudSettings());
        this.ui.maxDepth.addEventListener('input', () => this.updatePointCloudSettings());
  
        this.ui.showTrajectory.addEventListener('change', () => {
          this.trajectories.forEach(t => { t.visible = this.ui.showTrajectory.checked; });
        });
  
        this.ui.trajectoryLineWidth.addEventListener('input', () => this.updateTrajectorySettings());
        this.ui.trajectoryBallSize.addEventListener('input', () => this.updateTrajectorySettings());
        this.ui.trajectoryHistory.addEventListener('input', () => this.updateTrajectorySettings());
  
        this.ui.resetViewBtn.addEventListener('click', () => this.resetView());
  
        const resetSettingsBtn = document.getElementById('reset-settings-btn');
        if (resetSettingsBtn) {
          resetSettingsBtn.addEventListener('click', () => this.resetSettings());
        }
  
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && this.ui.settingsPanel.classList.contains('visible')) {
            this.ui.settingsPanel.classList.remove('visible');

        if (this.ui.settingsToggleBtn) {
          this.ui.settingsToggleBtn.addEventListener('click', () => {
            const isVisible = this.ui.settingsPanel.classList.toggle('visible');
            this.ui.settingsToggleBtn.classList.toggle('active', isVisible);
            if (isVisible) {
              const panelRect = this.ui.settingsPanel.getBoundingClientRect();
              const viewportHeight = window.innerHeight;
              if (panelRect.bottom > viewportHeight) {
                this.ui.settingsPanel.style.bottom = 'auto';
                this.ui.settingsPanel.style.top = '80px';
              }
            }

        if (this.ui.frustumSize) {
          this.ui.frustumSize.addEventListener('input', () => this.updateFrustumDimensions());
        }
  
        this.makeElementDraggable(this.ui.settingsPanel);
      }
  
      makeElementDraggable(element) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const dragHandle = element.querySelector('h2');
  
        const dragMouseDown = (e) => {
          e.preventDefault();
          pos3 = e.clientX;
          pos4 = e.clientY;
          document.onmouseup = closeDragElement;
          document.onmousemove = elementDrag;
          element.classList.add('dragging');
        };
  
        const elementDrag = (e) => {
          e.preventDefault();
          pos1 = pos3 - e.clientX;
          pos2 = pos4 - e.clientY;
          pos3 = e.clientX;
          pos4 = e.clientY;
  
          const newTop = element.offsetTop - pos2;
          const newLeft = element.offsetLeft - pos1;
  
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
  
          const maxTop = viewportHeight - 50;
          const maxLeft = viewportWidth - 50;
  
          element.style.top = Math.min(Math.max(newTop, 0), maxTop) + "px";
          element.style.left = Math.min(Math.max(newLeft, 0), maxLeft) + "px";
  
          element.style.bottom = 'auto';
          element.style.right = 'auto';
        };
  
        const closeDragElement = () => {
          document.onmouseup = null;
          document.onmousemove = null;
          element.classList.remove('dragging');
        };
  
        if (dragHandle) {
          dragHandle.onmousedown = dragMouseDown;
        } else {
          element.onmousedown = dragMouseDown;
        }
      }
  
      async loadData() {
        try {
          this.ui.loadingText.textContent = "Loading binary data...";
  
          const urlParams = new URLSearchParams(window.location.search);
          const dataPath = urlParams.get('data') || 'data.bin';
  
          const response = await fetch(dataPath);
          if (!response.ok) throw new Error(`Failed to load ${dataPath}`);
  
          const buffer = await response.arrayBuffer();
          const dataView = new DataView(buffer);
  
          const headerLen = dataView.getUint32(0, true);
          const headerText = new TextDecoder("utf-8").decode(buffer.slice(4, 4 + headerLen));
          const header = JSON.parse(headerText);
  
          const compressedBlob = new Uint8Array(buffer, 4 + headerLen);
          const decompressed = pako.inflate(compressedBlob).buffer;
  
          const arrays = {};
          for (const key in header) {
            if (key === "meta") continue;
            const meta = header[key];
            const { dtype, shape, offset, length } = meta;
            const slice = decompressed.slice(offset, offset + length);
            let typedArray;
            switch (dtype) {
              case "uint8": typedArray = new Uint8Array(slice); break;
              case "uint16": typedArray = new Uint16Array(slice); break;
              case "float32": typedArray = new Float32Array(slice); break;
              case "float64": typedArray = new Float64Array(slice); break;
              default: throw new Error(`Unknown dtype: ${dtype}`);
            }
            arrays[key] = { data: typedArray, shape: shape };
          }
  
          this.data = arrays;
          this.config = header.meta || {};
  
          this.initCameraWithCorrectFOV();
          this.computeGlobalAlignment();
  
          this.ui.loadingText.textContent = "Creating point cloud...";
  
          this.initPointCloud();
          this.initTrajectories();
  
          setTimeout(() => {
            this.ui.loadingOverlay.classList.add('fade-out');
            this.ui.statusBar.classList.add('hidden');
            this.startAnimation();
          }, 500);
        } catch (error) {
          console.error("Error loading data:", error);
          this.ui.statusBar.textContent = `Error: ${error.message}`;
          this.ui.loadingText.textContent = `Error loading data: ${error.message}`;
        }
      }
  
      initPointCloud() {
        this.updatePointCloud(0);
      }
  
      initTrajectories() {
        if (!this.data || !this.data.trajectories) return;
  
        this.trajectories.forEach(t => this.rootGroup.remove(t));
        this.trajectories = [];
  
        const shape = this.data.trajectories.shape;
        if (!shape || shape.length < 2) return;
  
        const [totalFrames, numTrajectories] = shape;
  
        const colors = this.createColorPalette(numTrajectories);
        const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
  
        const showTrajectory = this.ui.showTrajectory ? this.ui.showTrajectory.checked :
          (this.defaultSettings ? this.defaultSettings.showTrajectory : true);
        const trajectoryBallSize = parseFloat(this.ui.trajectoryBallSize.value) ||
          (this.defaultSettings ? this.defaultSettings.trajectoryBallSize : 0.005);
        const trajectoryLineWidth = parseFloat(this.ui.trajectoryLineWidth.value) ||
          (this.defaultSettings ? this.defaultSettings.trajectoryLineWidth : 3);
        const historyFramesSetting = parseInt(this.ui.trajectoryHistory.value) ||
          (this.defaultSettings ? this.defaultSettings.trajectoryHistory : 15);
  
        for (let i = 0; i < numTrajectories; i++) {
          const trajectoryGroup = new THREE.Group();
  
          const sphereGeometry = new THREE.SphereGeometry(trajectoryBallSize, 16, 16);
          const sphereMaterial = new THREE.MeshBasicMaterial({
            color: colors[i],
            transparent: true,
            opacity: 0.8
          });
          const positionMarker = new THREE.Mesh(sphereGeometry, sphereMaterial);
          trajectoryGroup.add(positionMarker);
  
          const historyFrames = Math.min(historyFramesSetting, this.config.totalFrames || totalFrames);
  
          const linePositions = new Float32Array(historyFrames * 3);
          const lineGeometry = new THREE.LineGeometry();
          lineGeometry.setPositions(linePositions);
  
          const lineMaterial = new THREE.LineMaterial({
            color: colors[i],
            linewidth: trajectoryLineWidth,
            resolution: resolution,
            dashed: false,
            transparent: true,
            opacity: 0.8
          });
  
          const trajectoryLine = new THREE.Line2(lineGeometry, lineMaterial);
          trajectoryGroup.add(trajectoryLine);
  
          trajectoryGroup.userData = {
            marker: positionMarker,
            line: trajectoryLine,
            color: colors[i]
          };
  
          this.rootGroup.add(trajectoryGroup);
          this.trajectories.push(trajectoryGroup);
        }
  
        this.trajectories.forEach(t => t.visible = showTrajectory);
      }
  
      createColorPalette(count) {
        const colors = [];
        const hueStep = 360 / Math.max(count, 1);
        for (let i = 0; i < count; i++) {
          const hue = (i * hueStep) % 360;
          const color = new THREE.Color().setHSL(hue / 360, 0.8, 0.6);
          colors.push(color);
        }
        return colors;
      }
  
      getFramePoints(typedArray, shape, frameIndex) {
        const T = shape[0];
        const N = shape[1];
        const C = shape[2];
        const frameSize = N * C;
        const clampedFrame = Math.max(0, Math.min(frameIndex, T - 1));
        const offset = clampedFrame * frameSize;
        return typedArray.subarray(offset, offset + frameSize);
      }
  
      updatePointCloud(frameIndex) {
        if (!this.data || !this.data.points) return;
  
        const points = this.data.points;
        const shape = points.shape;
        const totalFrames = shape[0];
        const numPoints = shape[1];
  
        const clampedFrame = Math.max(0, Math.min(frameIndex, totalFrames - 1));
        this.currentFrame = clampedFrame;
  
        const ptsFrame = this.getFramePoints(points.data, shape, clampedFrame);
  
        let hasColors = false;
        let colorsFrame = null;
        if (this.data.colors) {
          hasColors = true;
          colorsFrame = this.getFramePoints(this.data.colors.data, this.data.colors.shape, clampedFrame);
        }
  
        const positions = new Float32Array(numPoints * 3);
        const colors = new Float32Array(numPoints * 3);
  
        const maxDist = parseFloat(this.ui.maxDepth.value) || 100.0;
  
        let writeIndex = 0;
        for (let i = 0; i < numPoints; i++) {
          const x = ptsFrame[i * 3 + 0];
          const y = ptsFrame[i * 3 + 1];
          const z = ptsFrame[i * 3 + 2];
  
          const dist = Math.sqrt(x * x + y * y + z * z);
          if (!Number.isFinite(dist) || dist > maxDist) continue;
  
          positions[writeIndex * 3 + 0] = x;
          positions[writeIndex * 3 + 1] = -y;
          positions[writeIndex * 3 + 2] = -z;
  
          if (hasColors && colorsFrame) {
            colors[writeIndex * 3 + 0] = colorsFrame[i * 3 + 0] / 255.0;
            colors[writeIndex * 3 + 1] = colorsFrame[i * 3 + 1] / 255.0;
            colors[writeIndex * 3 + 2] = colorsFrame[i * 3 + 2] / 255.0;
          } else {
            colors[writeIndex * 3 + 0] = 1.0;
            colors[writeIndex * 3 + 1] = 1.0;
            colors[writeIndex * 3 + 2] = 1.0;
          }
  
          writeIndex++;
        }
  
        const finalPositions = positions.subarray(0, writeIndex * 3);
        const finalColors = colors.subarray(0, writeIndex * 3);
  
        if (this.pointCloud) {
          this.rootGroup.remove(this.pointCloud);
          this.pointCloud.geometry.dispose();
          this.pointCloud.material.dispose();
        }
  
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(finalPositions, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(finalColors, 3));
  
        const pointSize = parseFloat(this.ui.pointSize.value) ||
          (this.defaultSettings ? this.defaultSettings.pointSize : 0.03);
        const pointOpacity = parseFloat(this.ui.pointOpacity.value) ||
          (this.defaultSettings ? this.defaultSettings.pointOpacity : 1.0);
  
        const material = new THREE.PointsMaterial({
          size: pointSize,
          vertexColors: true,
          transparent: true,
          opacity: pointOpacity,
          sizeAttenuation: true
        });
  
        this.pointCloud = new THREE.Points(geometry, material);
        this.rootGroup.add(this.pointCloud);
  
        this.updateTrajectories(clampedFrame);
        this.updateCameraFrustum(clampedFrame);
  
        const total = this.config.totalFrames || totalFrames;
        const progress = (clampedFrame + 1) / total;
        this.ui.progress.style.width = `${progress * 100}%`;
      }
  
      updateTrajectories(frameIndex) {
        if (!this.data || !this.data.trajectories || this.trajectories.length === 0) return;
  
        const trajectoryData = this.data.trajectories.data;
        const [totalFrames, numTrajectories] = this.data.trajectories.shape;
        const historyFramesSetting = parseInt(this.ui.trajectoryHistory.value);
        const historyFrames = Math.min(historyFramesSetting, this.config.totalFrames || totalFrames);
  
        const clampedFrame = Math.max(0, Math.min(frameIndex, totalFrames - 1));
  
        for (let i = 0; i < numTrajectories; i++) {
          const trajectoryGroup = this.trajectories[i];
          const { marker, line } = trajectoryGroup.userData;
  
          const currentPos = new THREE.Vector3();
          const currentOffset = (clampedFrame * numTrajectories + i) * 3;
  
          currentPos.x = trajectoryData[currentOffset];
          currentPos.y = -trajectoryData[currentOffset + 1];
          currentPos.z = -trajectoryData[currentOffset + 2];
  
          marker.position.copy(currentPos);
  
          const positions = [];
          const historyToShow = Math.min(historyFrames, clampedFrame + 1);
  
          for (let j = 0; j < historyToShow; j++) {
            const historyFrame = Math.max(0, clampedFrame - j);
            const historyOffset = (historyFrame * numTrajectories + i) * 3;
  
            positions.push(
              trajectoryData[historyOffset],
              -trajectoryData[historyOffset + 1],
              -trajectoryData[historyOffset + 2]
            );
          }
  
          for (let j = historyToShow; j < historyFrames; j++) {
            positions.push(currentPos.x, currentPos.y, currentPos.z);
          }
  
          line.geometry.setPositions(positions);
          line.visible = clampedFrame > 0;
        }
      }
  
      updateTrajectorySettings() {
        if (!this.trajectories || this.trajectories.length === 0) return;
  
        const ballSize = parseFloat(this.ui.trajectoryBallSize.value);
        const lineWidth = parseFloat(this.ui.trajectoryLineWidth.value);
        const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
  
        this.trajectories.forEach(group => {
          const { marker, line } = group.userData;
  
          marker.geometry.dispose();
          marker.geometry = new THREE.SphereGeometry(ballSize, 16, 16);
  
          if (line.material) {
            line.material.linewidth = lineWidth;
            line.material.resolution.copy(resolution);
            line.material.needsUpdate = true;
          }
        });
  
        this.updateTrajectories(this.currentFrame);
      }
  
      get4x4Matrix(typedArray, shape, frameIndex) {
        const frameSize = 16;
        const offset = frameIndex * frameSize;
        const M = [];
        for (let i = 0; i < 4; i++) {
          const row = [];
          for (let j = 0; j < 4; j++) {
            row.push(typedArray[offset + i * 4 + j]);
          }
          M.push(row);
        }
        return M;
      }
  
      togglePlayback() {
        this.isPlaying = !this.isPlaying;
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
  
        if (this.isPlaying) {
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'block';
          this.lastFrameTime = performance.now();
        } else {
          playIcon.style.display = 'block';
          pauseIcon.style.display = 'none';
        }
      }
  
      cyclePlaybackSpeed() {
        const speeds = [0.5, 1, 2, 4, 8];
        const baseRate = this.config.baseFrameRate || 4;
        const speedRates = speeds.map(s => s * baseRate);
  
        let currentIndex = 0;
        const normalizedSpeed = this.playbackSpeed / baseRate;
  
        for (let i = 0; i < speeds.length; i++) {
          if (Math.abs(normalizedSpeed - speeds[i]) <
              Math.abs(normalizedSpeed - speeds[currentIndex])) {
            currentIndex = i;
          }
        }
  
        const nextIndex = (currentIndex + 1) % speeds.length;
        this.playbackSpeed = speedRates[nextIndex];
        this.ui.speedBtn.textContent = `${speeds[nextIndex]}x`;
  
        if (speeds[nextIndex] === 1) {
          this.ui.speedBtn.classList.remove('active');
        } else {
          this.ui.speedBtn.classList.add('active');
        }
      }
  
      seekTo(position) {
        const total = this.config.totalFrames ||
          (this.data.points ? this.data.points.shape[0] : 1);
        const frameIndex = Math.floor(position * total);
        this.currentFrame = Math.max(0, Math.min(frameIndex, total - 1));
        this.updatePointCloud(this.currentFrame);
      }
  
      updatePointCloudSettings() {
        this.updatePointCloud(this.currentFrame);
      }
  
      resetView() {
        if (this.cameraFrustum) {
          this.resetViewToFirstCamera();
        } else {
          this.camera.position.set(0, 0, this.config.cameraZ || 3.0);
          this.controls.target.set(0, 0, -1);
          this.controls.update();
        }
  
        this.ui.statusBar.textContent = "View reset";
        this.ui.statusBar.classList.remove('hidden');
  
        setTimeout(() => {
          this.ui.statusBar.classList.add('hidden');
        }, 3000);
      }
  
      resetViewToFirstCamera() {
        this.updateCameraFrustum(0);
  
        const camPos = new THREE.Vector3();
        const forward = new THREE.Vector3();
  
        this.cameraFrustum.getWorldPosition(camPos);
        this.cameraFrustum.getWorldDirection(forward);
  
        const target = new THREE.Vector3().copy(camPos).add(forward);
  
        this.camera.position.copy(camPos);
        this.camera.lookAt(target);
        this.controls.target.copy(target);
        this.controls.update();
      }
  
      onWindowResize() {
        if (!this.camera || !this.renderer) return;
  
        const windowAspect = window.innerWidth / window.innerHeight;
        this.camera.aspect = windowAspect;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
  
        if (this.trajectories && this.trajectories.length > 0) {
          const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
          this.trajectories.forEach(trajectory => {
            const { line } = trajectory.userData;
            if (line && line.material) {
              line.material.resolution = resolution;
            }
          });
        }
  
        if (this.cameraFrustum) {
          const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
          this.cameraFrustum.children.forEach(line => {
            if (line.material && line.material.resolution) {
              line.material.resolution.copy(resolution);
            }
          });
        }
      }
  
      startAnimation() {
        this.isPlaying = true;
        this.lastFrameTime = performance.now();
        this.playbackSpeed = this.config.baseFrameRate || 4;
  
        this.resetView();
  
        document.getElementById('play-icon').style.display = 'none';
        document.getElementById('pause-icon').style.display = 'block';
  
        this.animate();
      }
  
      animate() {
        requestAnimationFrame(() => this.animate());
  
        if (this.controls) this.controls.update();
  
        if (this.isPlaying && this.data && this.config.totalFrames) {
          const now = performance.now();
          const delta = (now - this.lastFrameTime) / 1000;
  
          const baseRate = this.config.baseFrameRate || 4;
          const framesToAdvance = Math.floor(delta * baseRate * this.playbackSpeed);
          if (framesToAdvance > 0) {
            const total = this.config.totalFrames;
            this.currentFrame = (this.currentFrame + framesToAdvance) % total;
            this.lastFrameTime = now;
            this.updatePointCloud(this.currentFrame);
          }
        }
  
        if (this.trajectories && this.trajectories.length > 0) {
          const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
          this.trajectories.forEach(trajectory => {
            const { line } = trajectory.userData;
            if (line && line.material) {
              line.material.resolution.copy(resolution);
            }
          });
        }
  
        if (this.renderer && this.scene && this.camera) {
          this.renderer.render(this.scene, this.camera);
        }
      }
  
      initCameraWithCorrectFOV() {
        const fov = this.config.fov || 60;
        const windowAspect = window.innerWidth / window.innerHeight;
  
        this.camera = new THREE.PerspectiveCamera(
          fov,
          windowAspect,
          0.1,
          10000
        );
  
        this.controls.object = this.camera;
        this.controls.update();
  
        this.initCameraFrustum();
      }
  
      initCameraFrustum() {
        this.cameraFrustum = new THREE.Group();
        this.rootGroup.add(this.cameraFrustum);
  
        this.initCameraFrustumGeometry();
  
        const showCameraFrustum = this.ui.showCameraFrustum ?
          this.ui.showCameraFrustum.checked :
          (this.defaultSettings ? this.defaultSettings.showCameraFrustum : false);
        this.cameraFrustum.visible = showCameraFrustum;
      }
  
      initCameraFrustumGeometry() {
        const fov = this.config.fov || 60;
        const originalAspect = this.config.original_aspect_ratio || 1.33;
  
        const size = parseFloat(this.ui.frustumSize.value) ||
          (this.defaultSettings ? this.defaultSettings.frustumSize : 0.2);
  
        const halfHeight = Math.tan(THREE.MathUtils.degToRad(fov / 2)) * size;
        const halfWidth = halfHeight * originalAspect;
  
        const vertices = [
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(-halfWidth, -halfHeight, size),
          new THREE.Vector3(halfWidth, -halfHeight, size),
          new THREE.Vector3(halfWidth, halfHeight, size),
          new THREE.Vector3(-halfWidth, halfHeight, size)
        ];
  
        const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
  
        const linePairs = [
          [1, 2], [2, 3], [3, 4], [4, 1],
          [0, 1], [0, 2], [0, 3], [0, 4]
        ];
  
        const colors = {
          edge: new THREE.Color(0x3366ff),
          ray: new THREE.Color(0x33cc66)
        };
  
        linePairs.forEach((pair, index) => {
          const positions = [
            vertices[pair[0]].x, vertices[pair[0]].y, vertices[pair[0]].z,
            vertices[pair[1]].x, vertices[pair[1]].y, vertices[pair[1]].z
          ];
  
          const lineGeometry = new THREE.LineGeometry();
          lineGeometry.setPositions(positions);
  
          const color = index < 4 ? colors.edge : colors.ray;
  
          const lineMaterial = new THREE.LineMaterial({
            color: color,
            linewidth: 2,
            resolution: resolution,
            dashed: false
          });
  
          const line = new THREE.Line2(lineGeometry, lineMaterial);
          this.cameraFrustum.add(line);
        });
      }
  
      updateCameraFrustum(frameIndex) {
        if (!this.cameraFrustum || !this.data || !this.data.extrinsics) return;
  
        const extrinsics = this.data.extrinsics;
        const matArr = this.get4x4Matrix(extrinsics.data, extrinsics.shape, frameIndex);
  
        const matrix = new THREE.Matrix4();
        matrix.set(
          matArr[0][0], matArr[0][1], matArr[0][2], matArr[0][3],
          matArr[1][0], matArr[1][1], matArr[1][2], matArr[1][3],
          matArr[2][0], matArr[2][1], matArr[2][2], matArr[2][3],
          matArr[3][0], matArr[3][1], matArr[3][2], matArr[3][3]
        );
  
        const position = new THREE.Vector3();
        position.setFromMatrixPosition(matrix);
  
        const rotMatrix = new THREE.Matrix4().extractRotation(matrix);
        const coordinateCorrection = new THREE.Matrix4().makeRotationX(Math.PI);
        const finalRotation = new THREE.Matrix4().multiplyMatrices(
          coordinateCorrection,
          rotMatrix
        );
  
        const quaternion = new THREE.Quaternion();
        quaternion.setFromRotationMatrix(finalRotation);
  
        position.y = -position.y;
        position.z = -position.z;
  
        this.cameraFrustum.position.copy(position);
        this.cameraFrustum.quaternion.copy(quaternion);
        this.cameraFrustum.updateMatrixWorld(true);
  
        const showCameraFrustum = this.ui.showCameraFrustum ?
          this.ui.showCameraFrustum.checked :
          (this.defaultSettings ? this.defaultSettings.showCameraFrustum : false);
        this.cameraFrustum.visible = showCameraFrustum;
  
        const resolution = new THREE.Vector2(window.innerWidth, window.innerHeight);
        this.cameraFrustum.children.forEach(line => {
          if (line.material && line.material.resolution) {
            line.material.resolution.copy(resolution);
          }
        });
      }
  
      computeGlobalAlignment() {
        if (!this.data || !this.data.extrinsics) {
          this.globalAlignQuat.identity();
          return;
        }
  
        const extrinsics = this.data.extrinsics;
        const matArr = this.get4x4Matrix(extrinsics.data, extrinsics.shape, 0);
  
        const m = new THREE.Matrix4();
        m.set(
          matArr[0][0], matArr[0][1], matArr[0][2], matArr[0][3],
          matArr[1][0], matArr[1][1], matArr[1][2], matArr[1][3],
          matArr[2][0], matArr[2][1], matArr[2][2], matArr[2][3],
          matArr[3][0], matArr[3][1], matArr[3][2], matArr[3][3]
        );
  
        const rot = new THREE.Matrix4().extractRotation(m);
        const correction = new THREE.Matrix4().makeRotationX(Math.PI);
        const rotVis = new THREE.Matrix4().multiplyMatrices(correction, rot);
  
        const upCam = new THREE.Vector3(0, -1, 0);
        upCam.applyMatrix4(rotVis);
        upCam.normalize();
  
        const globalUp = new THREE.Vector3(0, 1, 0);
  
        let dot = upCam.dot(globalUp);
        dot = Math.min(1.0, Math.max(-1.0, dot));
  
        const axis = new THREE.Vector3().crossVectors(upCam, globalUp);
  
        if (axis.lengthSq() < 1e-6) {
          if (dot > 0) {
            this.globalAlignQuat.identity();
          } else {
            this.globalAlignQuat.setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI);
          }
        } else {
          axis.normalize();
          const angle = Math.acos(dot);
          this.globalAlignQuat.setFromAxisAngle(axis, angle);
        }
  
        if (this.rootGroup) {
          this.rootGroup.quaternion.copy(this.globalAlignQuat);
          this.rootGroup.updateMatrixWorld(true);
        }
      }
  
      updateFrustumDimensions() {
        if (!this.cameraFrustum) return;
  
        while (this.cameraFrustum.children.length > 0) {
          const child = this.cameraFrustum.children[0];
          if (child.geometry) child.geometry.dispose();
          if (child.material) child.material.dispose();
          this.cameraFrustum.remove(child);
        }
  
        this.initCameraFrustumGeometry();
        this.updateCameraFrustum(this.currentFrame);
      }
  
      resetSettings() {
        if (!this.defaultSettings) return;
  
        this.applyDefaultSettings();
        this.updatePointCloudSettings();
        this.updateTrajectorySettings();
        this.updateFrustumDimensions();
  
        this.ui.statusBar.textContent = "Settings reset to defaults";
        this.ui.statusBar.classList.remove('hidden');
  
        setTimeout(() => {
          this.ui.statusBar.classList.add('hidden');
        }, 3000);
      }
    }
  
    window.addEventListener('DOMContentLoaded', () => {
      new PointCloudVisualizer();
    });
  </script>  
</body>
